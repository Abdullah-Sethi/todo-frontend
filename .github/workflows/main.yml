name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        run: npm run build

      - name: Zip Build Folder
        run: zip -r frontend-build.zip build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::634541169888:role/github-pipelines
          aws-region: eu-north-1

      - name: Upload Build to S3
        run: aws s3 cp frontend-build.zip s3://vizzapps-frontend-build/frontend-build.zip

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids i-0565844662ab697bd \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy frontend" \
            --parameters 'commands=[
              "cd /home/ubuntu && \
               aws s3 cp s3://vizzapps-frontend-build/frontend-build.zip frontend-build.zip && \
               sudo rm -rf /var/www/todo-frontend.vizzapps && \
               sudo unzip -o frontend-build.zip -d /var/www/todo-frontend.vizzapps && \
               sudo chown -R www-data:www-data /var/www/todo-frontend.vizzapps && \
               sudo chmod -R 755 /var/www/todo-frontend.vizzapps"
            ]'
