name: Frontend Deployment Pipeline (SSH)

on:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3️⃣ Install dependencies
      - name: Install Dependencies
        run: npm install

      # 4️⃣ Build React App
      - name: Build React App
        run: npm run build

      # 5️⃣ Zip build folder
      - name: Zip Build Folder
        run: zip -r frontend-build.zip build

      # 6️⃣ Upload artifact
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend-build.zip

  cd:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: ci

    steps:
      # 1️⃣ Download artifact
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./frontend-build

      # 2️⃣ Setup SSH key
      - name: Setup SSH
        run: |
          mkdir -p $HOME/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > $HOME/.ssh/key.pem
          chmod 600 $HOME/.ssh/key.pem
          ssh-keyscan -H 13.63.181.66 >> $HOME/.ssh/known_hosts

      # 3️⃣ Copy build to EC2
      - name: Copy build to EC2
        run: |
          scp -i $HOME/.ssh/key.pem ./frontend-build/frontend-build.zip ubuntu@13.63.181.66:/home/ubuntu/frontend-build.zip

      # 4️⃣ Deploy frontend
      - name: Deploy frontend on EC2
        run: |
          ssh -i $HOME/.ssh/key.pem ubuntu@13.63.181.66 << 'EOF'
          sudo rm -rf /var/www/todo-frontend.vizzapps
          sudo unzip -o /home/ubuntu/frontend-build.zip -d /var/www/todo-frontend.vizzapps
          sudo chown -R www-data:www-data /var/www/todo-frontend.vizzapps
          sudo chmod -R 755 /var/www/todo-frontend.vizzapps
          EOF
