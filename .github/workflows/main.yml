name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::634541169888:role/GitHubActions-Deploy
          aws-region: eu-north-1

      - name: Upload Build to EC2 via SSM
        run: |
          aws ssm send-command \
            --targets "Key=InstanceIds,Values=i-0565844662ab697bd" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy frontend" \
            --parameters 'commands=[
              "mkdir -p /var/www/todo-frontend.vizzapps",
              "rm -rf /var/www/todo-frontend.vizzapps/*",
              "cp -r ./build/* /var/www/todo-frontend.vizzapps/",
              "chown -R www-data:www-data /var/www/todo-frontend.vizzapps",
              "chmod -R 755 /var/www/todo-frontend.vizzapps"
            ]'
