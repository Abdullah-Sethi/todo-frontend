name: Frontend Deployment Pipeline (SSH)

on:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        run: npm run build

      - name: Zip Build Folder
        run: zip -r frontend-build.zip build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend-build.zip


  cd:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./frontend-build

      # ✅ CREATE KEY FILE FROM SECRET
      - name: Setup SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      # ✅ ADD HOST TO KNOWN HOSTS
      - name: Add EC2 to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 13.63.181.66 >> ~/.ssh/known_hosts

      # ✅ COPY BUILD TO SERVER
      - name: Copy build to EC2
        run: |
          scp -i key.pem ./frontend-build/frontend-build.zip ubuntu@13.63.181.66:/home/ubuntu/frontend-build.zip

      # ✅ DEPLOY BUILD
      - name: Deploy frontend
        run: |
          ssh -i key.pem ubuntu@13.63.181.66 << 'EOF'
          sudo rm -rf /var/www/todo-frontend.vizzapps
          sudo unzip -o /home/ubuntu/frontend-build.zip -d /var/www/todo-frontend.vizzapps
          sudo chown -R www-data:www-data /var/www/todo-frontend.vizzapps
          sudo chmod -R 755 /var/www/todo-frontend.vizzapps
          EOF
